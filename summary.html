<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>信息汇总</title>

<style>

body{
    margin:0;
    background:#f8f8f6;
    font-family:"Song", serif;
}

.container{
    width:min(1000px,90vw);
    margin:100px auto;
}

.section{
    margin-bottom:50px;
}

.section-title{
    font-size:28px;
    margin-bottom:20px;
    border-bottom:1px solid rgba(0,0,0,0.1);
    padding-bottom:10px;
}

.entry{
    margin-bottom:20px;
    padding-left:20px;
}

.entry-id{
    font-size:18px;
}

.entry-content{
    color:#666;
}

</style>

</head>

<body>

<div class="container">
    <div id="content"></div>
</div>

<script>

const areaOrder = ["启程","区域A","区域B","区域C","区域D","区域X","PUZZLE","终章"];

fetch("questions.csv")
.then(r => r.text())
.then(csv => {

    const lines = csv.trim().split("\n");
    lines.shift();

    let grouped = {};
    areaOrder.forEach(a => grouped[a] = []);

    lines.forEach(line => {

        const parts = line.split(",");

        const id = parts[0].trim().toUpperCase();
        const area = parts[4].trim();

        if(grouped[area]){
            grouped[area].push(id);
        }

    });

    const container = document.getElementById("content");

    areaOrder.forEach(area => {

        let html = `<div class="section"><div class="section-title">${area}</div>`;

        /* PUZZLE */
        if(area === "PUZZLE"){

            const puzzleIds = ["PUZZLE1","PUZZLE2","PUZZLE3","PUZZLE4"];

            const puzzleHints = [
                "本次探索的某个区域的名称也在这个公园名称里出现了",
                "1000",
                "秋千",
                "龙吴路"
            ];

            puzzleIds.forEach((id, i) => {

                if(localStorage.getItem(id)){

                    html += `
                        <div class="entry">
                            <div class="entry-id">提示${i+1}</div>
                            <div class="entry-content">${puzzleHints[i]}</div>
                        </div>
                    `;
                }
            });

        } else {

            grouped[area].forEach(id => {

                const text = localStorage.getItem(id);

                if(!text) return;

                html += `
                    <div class="entry">
                        <div class="entry-id">${id}</div>
                        <div class="entry-content">${text}</div>
                    </div>
                `;
            });

        }

        html += `</div>`;
        container.innerHTML += html;

    });

});

</script>

</body>
</html>
