<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>信息汇总</title>

<style>

@font-face {
    font-family: "Song";
    src: url("Font/Song.ttf") format("truetype");
}

@font-face {
    font-family: "HandWritten";
    src: url("Font/HandWritten.ttf") format("truetype");
}

body{
    margin:0;
    background:#f8f8f6;
    font-family:"Song", serif;
}

/* 左上角原生下拉框容器与样式 */
.nav-select-container {
    position: fixed;
    top: 25px;
    left: 25px;
    z-index: 1000;
}

.nav-select {
    padding: 10px 30px 10px 18px;
    font-size: 16px;
    font-family: "HandWritten", serif;
    color: #444;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 12px;
    cursor: pointer;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    /* 精致的自定义小箭头 */
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M0,0 L5,5 L10,0' fill='none' stroke='%23444' stroke-width='1.5'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
}

.nav-select:hover {
    background-color: rgba(255,255,255,0.8);
}

.nav-select option {
    font-family: "Song", serif;
    background: #fff;
    color: #444;
}

/* 🌟 新增：大标题样式 */
.page-title {
    font-family: "Song", serif;
    font-size: clamp(40px, 5vw, 56px); /* 响应式字号，手机上会自动缩小一点 */
    color: #333;
    text-align: center;
    margin-bottom: 60px;
}

.container{
    width:min(1000px,90vw);
    margin:60px auto 100px auto; /* 调整了顶边距，配合大标题的间距 */
}

.section{
    margin-bottom:50px;
}

.section-title{
    font-size:28px;
    margin-bottom:20px;
    border-bottom:1px solid rgba(0,0,0,0.1);
    padding-bottom:10px;
}

.entry{
    margin-bottom:15px;
    padding-left:20px;
    display: flex;
    align-items: flex-start;
}

.entry-id{
    font-size:18px;
    font-weight: bold;
    min-width: 100px; 
    flex-shrink: 0;
}

.entry-content{
    color:#666;
    font-size:18px;
    word-break: break-all;
}

/* 针对未解锁文本的样式 */
.locked {
    color: #ccc;
    letter-spacing: 2px;
}

</style>

</head>

<body>

<div class="nav-select-container">
    <select class="nav-select" onchange="navigate(this)">
        <option value="index.html">首页</option>
        <option value="task.html">工具箱</option>
        <option value="hint.html">提示</option>
        <option value="submit.html">答案提交</option>
        <option value="summary.html" selected>信息汇总</option>
    </select>
</div>

<div class="container">
    <div class="page-title">信息汇总</div>
    
    <div id="content"></div>
</div>

<script>

// 下拉框跳转函数
function navigate(selectElement) {
    const url = selectElement.value;
    if (url) {
        window.location.href = url;
    }
}

// 保持你期望的页面显示顺序
const areaOrder = ["启程","区域A","区域B","区域C","区域D","PUZZLE"];

// 建立前端显示名称与 CSV 里的 Area 字段的映射关系
const areaMapping = {
    "启程": "启程",
    "区域A": "A",
    "区域B": "B",
    "区域C": "C",
    "区域D": "D",
    "PUZZLE": "PUZZLE"
};

fetch("questions.csv")
.then(r => r.text())
.then(csv => {

    const lines = csv.trim().split("\n");
    lines.shift(); // 移除表头

    let grouped = {};
    Object.values(areaMapping).forEach(a => grouped[a] = []);

    lines.forEach(line => {
        if (!line.trim()) return;

        const parts = line.split(",");
        const id = parts[0].trim().toUpperCase();
        const area = parts[4].trim();

        if(grouped[area]){
            grouped[area].push(id);
        }
    });

    const container = document.getElementById("content");

    areaOrder.forEach(areaDisplay => {
        const csvAreaName = areaMapping[areaDisplay];
        let html = `<div class="section"><div class="section-title">${areaDisplay}</div>`;

        /* PUZZLE 区域特殊处理 */
        if(areaDisplay === "PUZZLE"){

            const puzzleIds = ["PUZZLE1","PUZZLE2","PUZZLE3","PUZZLE4"];
            const puzzleHints = [
                "本次探索的某个区域的名称也在这个公园名称里出现了",
                "1000",
                "秋千",
                "龙吴路"
            ];

            // 计算出用户到底答对了几个 puzzle
            let unlockedCount = 0;
            puzzleIds.forEach(id => {
                if(localStorage.getItem(id)) {
                    unlockedCount++;
                }
            });

            // 根据答对的数量，按顺序渲染提示
            puzzleIds.forEach((id, i) => {
                const hasUnlocked = i < unlockedCount;
                const contentText = hasUnlocked ? puzzleHints[i] : `<span class="locked">？？？</span>`;

                html += `
                    <div class="entry">
                        <div class="entry-id">提示${i+1}</div>
                        <div class="entry-content">${contentText}</div>
                    </div>
                `;
            });

        } else {
            /* 普通区域处理 */
            grouped[csvAreaName].forEach(id => {
                const text = localStorage.getItem(id);
                const contentText = text ? text : `<span class="locked">？？？</span>`;

                html += `
                    <div class="entry">
                        <div class="entry-id">${id}</div>
                        <div class="entry-content">${contentText}</div>
                    </div>
                `;
            });
        }

        html += `</div>`;
        container.innerHTML += html;
    });

});

</script>

</body>
</html>
