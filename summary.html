<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>信息汇总</title>

<style>

@font-face {
    font-family: "Song";
    src: url("Font/Song.ttf") format("truetype");
}

@font-face {
    font-family: "HandWritten";
    src: url("Font/HandWritten.ttf") format("truetype");
}

body{

    margin:0;

    background:#f8f8f6;

    font-family:"Song", serif;
}

/* 左上角导航 */

.navigation{

    position:fixed;

    top:25px;

    left:25px;

    z-index:100;
}

.navigation select{

    padding:10px 15px;

    font-size:16px;

    font-family:"HandWritten", serif;

    color:#444;

    background:rgba(255,255,255,0.35);

    border:1px solid rgba(0,0,0,0.08);

    border-radius:12px;

    cursor:pointer;
}

/* 主体 */

.container{

    width:min(1000px,90vw);

    margin:100px auto;
}

.title{

    text-align:center;

    font-size:clamp(36px,5vw,60px);

    margin-bottom:60px;

    color:#333;
}

.section{

    margin-bottom:50px;
}

.section-title{

    font-size:30px;

    color:#333;

    border-bottom:1px solid rgba(0,0,0,0.1);

    padding-bottom:10px;

    margin-bottom:20px;
}

.entry{

    margin-bottom:25px;

    padding-left:20px;
}

.entry-id{

    font-size:20px;

    color:#444;

    margin-bottom:8px;
}

.entry-content{

    color:#777;

    line-height:1.8;

    padding-left:15px;
}

</style>

</head>

<body>

<div class="navigation">

    <select onchange="jump(this.value)">

        <option value="">
            跳转至
        </option>

        <option value="task.html">
            任务书获取
        </option>

        <option value="submit.html">
            答案提交
        </option>

        <option value="hint.html">
            提示
        </option>

    </select>

</div>

<div class="container">

    <div class="title">
        信息汇总
    </div>

    <div id="content"></div>

</div>

<script>

function jump(page){

    if(page){

        window.location.href = page;

    }

}

const areaOrder = [

    "启程",
    "区域A",
    "区域B",
    "区域C",
    "区域D",
    "区域X",
    "终章"

];

fetch("questions.csv")

.then(response => response.text())

.then(csv => {

    const lines = csv.trim().split("\n");

    lines.shift();

    let grouped = {};

    areaOrder.forEach(area => {

        grouped[area] = [];

    });

lines.forEach(line => {

    const parts =
        line.split(",");

    if(parts.length < 5)
        return;

    const id =
        parts[0]
        .replace(/\r/g,"")
        .trim();

    const area =
        parts[4]
        .replace(/\r/g,"")
        .trim();

    if(grouped[area]){

        grouped[area].push(id);

    }

});

    const container =
        document.getElementById("content");

    areaOrder.forEach(area => {

        let html =

        `<div class="section">

            <div class="section-title">

                ${area}

            </div>`;

        grouped[area].forEach(id => {

            const text =
                localStorage.getItem(id)
                || "暂无信息";

            html +=

            `<div class="entry">

                <div class="entry-id">

                    ${id}

                </div>

                <div class="entry-content">

                    ${text}

                </div>

            </div>`;

        });

        html += "</div>";

        container.innerHTML += html;

    });

});

</script>

</body>

</html>
