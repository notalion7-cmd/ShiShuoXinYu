<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>狮说新域</title>

<style>

@font-face {

    font-family: "Song";

    src: url("Font/Song.ttf") format("truetype");

}

@font-face {

    font-family: "HandWritten";

    src: url("Font/HandWritten.ttf") format("truetype");

}

body{

    margin:0;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#f8f8f6;
}

.container{

    text-align:center;
}

h1{

    margin-bottom:60px;

    font-family:"Song", serif;

    font-weight:normal;

    font-size:clamp(42px,8vw,72px);

    letter-spacing:0.2em;

    color:#333;
}

select{

    width:220px;

    padding:12px;

    font-size:18px;

    font-family:"HandWritten", serif;

    color:#444;

    background:rgba(255,255,255,0.35);

    border:1px solid rgba(0,0,0,0.08);

    border-radius:12px;

    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

    <h1>狮说新域</h1>

    <select onchange="jump(this.value)">

        <option value="">
            进入
        </option>

        <option value="task.html">
            任务书获取
        </option>

        <option value="submit.html">
            答案提交
        </option>

        <option value="hint.html">
            提示
        </option>

        <option value="summary.html">
            信息汇总
        </option>

    </select>

</div>

<script>

function jump(page){

    if(page){

        window.location.href = page;

    }

}

</script>

</body>

</html>
