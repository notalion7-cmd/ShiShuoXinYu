<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>答案提交</title>

<style>

@font-face {
    font-family: "Song";
    src: url("Font/Song.ttf") format("truetype");
}

@font-face {
    font-family: "HandWritten";
    src: url("Font/HandWritten.ttf") format("truetype");
}

body{

    margin:0;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#f8f8f6;

    font-family:"Song", serif;
}

/* 左上角导航 */

.navigation{

    position:fixed;

    top:25px;

    left:25px;
}

.navigation select{

    padding:10px 15px;

    font-size:16px;

    font-family:"HandWritten", serif;

    color:#444;

    background:rgba(255,255,255,0.35);

    border:1px solid rgba(0,0,0,0.08);

    border-radius:12px;

    cursor:pointer;
}

/* 主体 */

.container{

    width:min(700px,90vw);

    text-align:center;
}

.tip{

    font-family:"HandWritten", serif;

    font-size:clamp(14px,2vw,20px);

    color:#666;

    margin-bottom:25px;
}

input{

    width:min(500px,90%);

    padding:14px;

    font-size:18px;

    font-family:"Song", serif;

    border:1px solid rgba(0,0,0,0.08);

    border-radius:12px;

    background:rgba(255,255,255,0.35);

    box-sizing:border-box;
}

button{

    margin-top:20px;

    padding:12px 30px;

    font-family:"Song", serif;

    font-size:18px;

    color:#444;

    background:rgba(255,255,255,0.35);

    border:1px solid rgba(0,0,0,0.08);

    border-radius:12px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    background:rgba(255,255,255,0.65);

    transform:translateY(-2px);
}

#result{

    margin-top:35px;

    font-size:22px;

    color:#333;

    min-height:50px;

    line-height:1.8;
}

</style>

</head>

<body>

<div class="navigation">

    <select onchange="jump(this.value)">

        <option value="">
            跳转至
        </option>

        <option value="task.html">
            任务书获取
        </option>

        <option value="hint.html">
            提示
        </option>

        <option value="summary.html">
            信息汇总
        </option>

    </select>

</div>

<div class="container">

    <div class="tip">
        请按规定格式提交（题号 空格 答案）
    </div>

    <input
        id="answer"
        placeholder="例如：A1 273">

    <br>

    <button onclick="checkAnswer()">
        提交
    </button>

    <div id="result"></div>

</div>

<script>

function jump(page){

    if(page){

        window.location.href = page;

    }

}

let questions = [];

fetch("questions.csv")

.then(response => response.text())

.then(csv => {

    console.log(csv);

    const lines = csv.trim().split("\n");

    lines.shift();

    lines.forEach(line => {

        const parts = line.split(",");

        questions.push({

            id: parts[0].trim(),

            question: parts[1].trim(),

            answer: parts[2].trim(),

            hint: parts[3].trim(),

            area: parts[4].trim()

        });

    });

});

function checkAnswer(){

    const input =
        document.getElementById("answer")
        .value
        .trim();

    const pieces =
        input.split(" ");

    if(pieces.length < 2){

        document.getElementById("result")
            .innerText =
            "格式错误";

        return;

    }

    const id =
        pieces[0];

    const answer =
        pieces.slice(1).join(" ");

    const question =
        questions.find(
            q => q.id === id
        );

    if(!question){

        document.getElementById("result")
            .innerText =
            "题号不存在";

        return;

    }

    if(answer !== question.answer){

        document.getElementById("result")
            .innerText =
            "答案错误";

        return;

    }

    if(localStorage.getItem(id)){

        document.getElementById("result")
            .innerText =
            "该信息已收录";

        return;

    }

    localStorage.setItem(
        id,
        question.hint
    );

    document.getElementById("result")
        .innerHTML =

        `提交成功<br><br>${question.hint}`;

}

</script>

</body>

</html>
