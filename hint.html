<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>提示</title>

<style>

@font-face {
    font-family: "Song";
    src: url("Font/Song.ttf") format("truetype");
}

@font-face {
    font-family: "HandWritten";
    src: url("Font/HandWritten.ttf") format("truetype");
}

body{
    margin:0;
    background:#f8f8f6;
    font-family:"Song", serif;
}

/* 🌟 左上角原生下拉框容器与样式（与前面页面完全一致） */
.nav-select-container {
    position: fixed;
    top: 25px;
    left: 25px;
    z-index: 1000;
}

.nav-select {
    padding: 10px 30px 10px 18px;
    font-size: 16px;
    font-family: "HandWritten", serif;
    color: #444;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 12px;
    cursor: pointer;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M0,0 L5,5 L10,0' fill='none' stroke='%23444' stroke-width='1.5'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
}

.nav-select:hover {
    background-color: rgba(255,255,255,0.8);
}

.nav-select option {
    font-family: "Song", serif;
    background: #fff;
    color: #444;
}

/* 🌟 页面大标题 */
.page-title {
    font-family: "Song", serif;
    font-size: clamp(40px, 5vw, 56px);
    color: #333;
    text-align: center;
    margin-bottom: 60px;
}

/* ===== 主体 ===== */
.container{
    width:min(1000px,90vw);
    margin: 60px auto 100px auto; /* 统一的外边距 */
}

.section{
    margin-bottom:50px;
}

.section-title{
    font-size:28px;
    margin-bottom:20px;
    border-bottom:1px solid rgba(0,0,0,0.1);
    padding-bottom:10px;
}

.hint-block{
    margin-bottom:20px;
}

/* 🌟 核心修改：将原本的按钮外观彻底改造成普通的、可点击的文本句子 */
.hint-button{
    display: inline-block;
    padding: 0;
    background: none;
    border: none;
    border-bottom: 1px dashed #888; /* 加一条淡淡的虚线暗示可以点击 */
    border-radius: 0;
    cursor: pointer;
    font-size: 18px;
    font-family: "Song", serif;
    color: #333;
    text-align: left;
    transition: color 0.2s;
}

.hint-button:hover {
    color: #888; /* 悬浮时字变淡，给予点击反馈 */
}

.hint-text{
    margin-top:12px;
    margin-left:15px;
    display:none;
    color:#666;
    font-size:18px;
    line-height: 1.6;
}

/* ===== 弹窗 ===== */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
    justify-content:center;
    align-items:center;
    z-index: 2000;
}

.modal-content{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:320px;
    font-family: "Song", serif;
    font-size: 18px;
}

.modal-buttons{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.no-button{
    padding:10px 24px;
    border:none;
    border-radius:10px;
    background:#d9d9d9;
    font-family: "HandWritten", serif;
    font-size: 16px;
    cursor: pointer;
}

.yes-button{
    padding:10px 24px;
    border:none;
    border-radius:10px;
    background:#555;
    color:white;
    font-family: "HandWritten", serif;
    font-size: 16px;
    cursor: pointer;
}

/* 针对手机移动端的专属微调 */
@media (max-width: 600px) {
    .container {
        margin: 90px auto 60px auto;
    }
    .page-title {
        margin-bottom: 40px;
    }
}

</style>

</head>

<body>

<div class="nav-select-container">
    <select class="nav-select" onchange="navigate(this)">
        <option value="index.html">首页</option>
        <option value="task.html">工具箱</option>
        <option value="hint.html" selected>提示</option>
        <option value="submit.html">答案提交</option>
        <option value="summary.html">信息汇总</option>
    </select>
</div>

<div class="container">
    <div class="page-title">提示</div>
    
    <div id="container"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        是否确定解锁该提示？
        <div class="modal-buttons">
            <button class="no-button" onclick="closeModal()">否</button>
            <button class="yes-button" onclick="unlockHint()">是</button>
        </div>
    </div>
</div>

<script>

let currentId = null;

// 下拉框跳转
function navigate(selectElement) {
    const url = selectElement.value;
    if (url) {
        window.location.href = url;
    }
}

/* 打开弹窗 */
function openModal(id){
    currentId = id;
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

/* 解锁 */
function unlockHint(){
    const el = document.querySelector(`[data-id="${currentId}"] .hint-text`);
    if(el) el.style.display = "block";

    localStorage.setItem(currentId, "1");
    closeModal();
}

/* CSV */
fetch("hint.csv")
.then(res => res.text())
.then(csv => {

    const lines = csv.trim().split("\n");
    lines.shift();

    const grouped = {};
    const container = document.getElementById("container");

    // 🌟 核心修改：移除原先的 normalize 合并逻辑，让 PUZZLE1, PUZZLE2 等保持原样独立分类
    function normalize(type){
        return type; 
    }

    lines.forEach((line, index) => {
        if (!line.trim()) return;

        const parts = line.split(",");
        const name = parts[0].trim();
        const hint = parts[1].trim();
        const type = normalize(parts[2].trim());

        const id = "hint_" + index;

        if(!grouped[type]) grouped[type] = [];
        grouped[type].push({id, name, hint});

    });

    for(const type in grouped){

        let html = `
        <div class="section">
            <div class="section-title">${type}</div>
        `;

        grouped[type].forEach(item => {

            html += `
            <div class="hint-block" data-id="${item.id}">

                <button class="hint-button" onclick="openModal('${item.id}')">
                    ${item.name}
                </button>

                <div class="hint-text">
                    ${item.hint}
                </div>

            </div>
            `;

            if(localStorage.getItem(item.id)){
                setTimeout(() => {
                    const el = document.querySelector(`[data-id="${item.id}"] .hint-text`);
                    if(el) el.style.display = "block";
                }, 0);
            }

        });

        html += `</div>`;
        container.innerHTML += html;
    }

});

</script>

</body>
</html>
